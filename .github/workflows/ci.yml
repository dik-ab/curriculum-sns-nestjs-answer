name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sns_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sns_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sns_test?schema=public
      JWT_SECRET: test-secret
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare E2E environment
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/sns_test?schema=public"
          JWT_SECRET="test-secret"
          FRONTEND_URL="http://localhost:5173"
          EOF

      - name: Apply database migrations
        run: pnpm exec dotenv -e .env.test -- prisma migrate deploy

      - name: E2E tests
        run: pnpm run test:e2e
